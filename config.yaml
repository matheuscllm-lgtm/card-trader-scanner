# ═══════════════════════════════════════════════════════════════════
# CardTrader Scanner — Configuração
# ═══════════════════════════════════════════════════════════════════
# Este arquivo define QUAIS sets escanear por default.
# Pode ser sobrescrito por CLI: --sets sv1 sv2 sv3
#
# Como descobrir códigos de set? Na primeira execução o scanner
# lista TODAS as expansões e seus códigos no log. Use os códigos
# dos sets que quer escanear periodicamente.
# ═══════════════════════════════════════════════════════════════════

# Sets — vazio = scanner usa TODAS as expansões CT (~832)
# Pra restringir, descomentar e listar codes
sets: []
# Exemplos:
#  - sfa    # Shrouded Fable
#  - scr    # Stellar Crown

# Filtros de seller (experimentais — comentar para desativar)
# sellers:
#   min_positive_feedback_pct: 95
#   only_hub_shippers: false        # true = só sellers do hub central CT
#   exclude_user_types: []          # ex: ["private"] se quiser só pro
