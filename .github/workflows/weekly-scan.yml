name: Weekly CT Scan (full)

# Scan COMPLETO — todas as ~832 expansões Pokemon no CardTrader.
# Sem schedule: dispatch manual apenas (decisão operador 2026-05-16). Roda
# LOCAL preferencialmente; GH Actions só quando quota free tier permite.

on:
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Margem bruta mínima (fração, ex 0.30)'
        required: false
        default: '0.30'
      min_net_margin:
        description: 'Margem líquida REAL mínima após Hub fee (ex 0.20)'
        required: false
        default: '0.20'
      validate_top:
        description: 'Quantos candidatos validar per-blueprint (full scope: bump pra 100+)'
        required: false
        default: '100'
      per_set_timeout:
        description: 'v2.4 timeout per-set (min). Default 8. Sets que estourarem vão pra skip-list.'
        required: false
        default: '8'

concurrency:
  group: ct-scan
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    # Full scan ~832 expansões × pricing rate variável = potencialmente horas.
    # GH Actions free tier job max = 360min (6h). v2.4 per-set timeout + skip-list
    # protegem contra sets travados queimarem todo o budget.
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner (full scope, no --sets)
        env:
          CT_JWT: ${{ secrets.CT_JWT }}
          POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          THRESHOLD="${{ github.event.inputs.threshold || '0.30' }}"
          MIN_NET="${{ github.event.inputs.min_net_margin || '0.20' }}"
          VAL_TOP="${{ github.event.inputs.validate_top || '100' }}"
          PER_SET_TIMEOUT="${{ github.event.inputs.per_set_timeout || '8' }}"
          # Sem --sets → scanner pega TODAS as expansões via list_expansions
          python cardtrader_scanner.py \
            --threshold $THRESHOLD \
            --validate-top $VAL_TOP \
            --min-net-margin $MIN_NET \
            --per-set-timeout $PER_SET_TIMEOUT \
            --output "cardtrader_scan_weekly_$(date +%Y%m%d_%H%M).xlsx"

      - name: Run postprocess
        env:
          PYTHONIOENCODING: utf-8
        run: |
          XLSX=$(ls -t cardtrader_scan_weekly_*.xlsx 2>/dev/null | head -1)
          if [ -z "$XLSX" ]; then
            echo "Nenhum XLSX gerado pelo scanner — pulando postprocess"
            exit 0
          fi
          python cardtrader_postprocess.py \
            --core "$XLSX" --hype "$XLSX" --dead "$XLSX" \
            --output "cardtrader_relatorio_weekly_$(date +%Y-%m-%d).xlsx"

      - name: Upload scan outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: weekly-scan-${{ github.run_id }}
          path: |
            cardtrader_scan_weekly_*.xlsx
            cardtrader_relatorio_weekly_*.xlsx
            cardtrader_scanner.log
            scanner_skip_list.json
          retention-days: 30
          if-no-files-found: error

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Weekly CT scan failed: run ${{ github.run_id }}" \
            --body "Weekly full scan failed at $(date -u +'%Y-%m-%d %H:%M UTC'). Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
