name: Tests

# CI de TESTES — roda a suíte de regressão a cada push/PR.
# OFFLINE por design: os testes mockam a rede (CardTrader + pokemontcg.io),
# então este workflow NÃO precisa de nenhum secret (CT_JWT etc.). É o contraponto
# dos workflows de SCAN (daily-scan.yml / weekly-scan.yml), que rodam scans reais,
# precisam de secrets + rede e só disparam por dispatch manual.
#
# Por que existe (loop de melhoria 2026-06-17): até agora a suíte só era validada
# à mão no ambiente local. Sem um gate automático, uma regressão num PR só
# apareceria quando alguém lembrasse de rodar pytest. Este workflow torna o gate
# automático para toda mudança de código.

on:
  push:
    branches: ["**"]
    # Documentação e exemplos não mexem na suíte — não gastam minutos de CI.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      # 3.12 = versão de desenvolvimento documentada (SESSION-HANDOFF: "Python
      # 3.12.10 ... Run-ready"). Os workflows de scan usam 3.14; aqui fixamos a
      # baseline conhecida-boa da suíte de testes.
      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Smoke — CLIs respondem a --help (offline, sem secrets)
        run: |
          python cardtrader_scanner.py --help > /dev/null
          python cardtrader_postprocess.py --help > /dev/null

      - name: pytest (tests/)
        run: python -m pytest tests/ -q

      # scripts/test_*.py chamam sys.exit(0) no nível do módulo (feitos pra rodar
      # standalone, não via coleção do pytest) → rodamos um por um.
      - name: Testes standalone (scripts/test_*.py)
        run: |
          set -e
          for t in scripts/test_*.py; do
            echo "== $t =="
            python "$t"
          done
